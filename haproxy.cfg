global
    maxconn 50000
    log stdout format raw local0

defaults
    mode http
    timeout connect 500ms
    timeout client  2100ms
    timeout server  2100ms
    option http-server-close
    option forwardfor

frontend fraud_front
    bind *:9999
    default_backend fraud_back

backend fraud_back
    balance leastconn
    server api1 api1:9999 check inter 500ms rise 1 fall 1
    server api2 api2:9999 check inter 500ms rise 1 fall 1
